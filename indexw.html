<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="stylew.css">
</head>
<body>

<div class="container">
    <h1>🌤 Weather Dashboard</h1>

    <div class="search-box">
        <input
            type="text"
            id="cityInput"
            placeholder="Enter city name"
        >
        <button id="searchBtn">Search</button>
    </div>

    <div id="error" class="error"></div>

    <div class="weather-card" id="weatherCard">
        <h2 id="city">City</h2>

        <p>🌡 <strong>Temperature:</strong> <span id="temp">--</span></p>

        <p>💧 <strong>Humidity:</strong> <span id="humidity">--</span></p>

        <p>🌬 <strong>Wind Speed:</strong> <span id="wind">--</span></p>

        <p>☁ <strong>Weather:</strong> <span id="description">--</span></p>
    </div>
</div>

<script src="scriptw.js"></script>

</body>
</html>
